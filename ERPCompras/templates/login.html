<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iniciar sesión - Gestión de Compras</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8f5e9 100%);
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #273F8F;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        main {
            background: transparent;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .form {
            background: white;
            padding: 40px;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .form h2 {
            margin: 0 0 10px 0;
            color: #222;
            font-size: 28px;
        }

        .form > p {
            color: #666;
            margin: 0 0 25px 0;
            font-size: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
            background: #fafafa;
        }

        .form-group input:focus {
            outline: none;
            background: white;
            border-color: #273F8F;
            box-shadow: 0 0 0 3px rgba(154, 205, 50, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .form-actions button,
        .form-actions a {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: background 0.3s;
        }

        .btn-primary {
            background-color: #273F8F;
            color: white;
        }

        .btn-primary:hover {
            background-color: #9acd32;
        }

        .btn-outline {
            background-color: #f0f0f0;
            color: black;
            border: 1px solid #ccc;
        }

        .btn-outline:hover {
            background-color: #e0e0e0;
        }

        .error {
            background-color: #ffebee;
            color: #a00;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .success {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .extra-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 13px;
        }

        .show-password {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            user-select: none;
        }

        footer {
            background-color: black;
            color: white;
            text-align: center;
            padding: 15px;
        }

        @@media (max-width: 900px) {
            header {
                padding: 20px 10px;
            }
            .form {
                padding: 30px;
                max-width: 90%;
            }
        }

        @@media (max-width: 600px) {
            header {
                padding: 15px 10px;
            }
            main {
                padding: 20px 10px;
            }
            .form {
                padding: 25px;
                max-width: 100%;
            }
            .form h2 {
                font-size: 22px;
            }
            .form-actions {
                flex-direction: column;
                gap: 10px;
            }
            footer {
                padding: 15px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <header>
    </header>

    <main>
        <div class="form">
            <h2>Inicio de sesión</h2>
            <p>Introduce tu correo y contraseña para continuar</p>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            {% if success %}
                <div class="success">{{ success }}</div>
            {% endif %}

            <form method="post">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input id="email" name="email" type="email" required placeholder="tucorreo@ejemplo.com" />
                </div>

                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input id="contrasena" name="password" type="password" required placeholder="Contraseña" />
                </div>

                <div class="extra-options">
                    <label class="show-password">
                        <input type="checkbox" data-toggle="contrasena"> Mostrar contraseña
                    </label>
                    <a href="/recover-password" style="color: #273F8F; text-decoration: none;">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="form-actions">
                    <a href="/register" class="btn-outline">Crear cuenta</a>
                    <button type="submit" class="btn-primary">Ingresar</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        &copy; 2026 Gestión de compras. Todos los derechos reservados.
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const checkbox = document.querySelector('[data-toggle="contrasena"]');
            const passwordInput = document.getElementById('contrasena');

            if (checkbox) {
                checkbox.addEventListener('change', function() {
                    passwordInput.type = this.checked ? 'text' : 'password';
                });
            }
        });
    </script>
</body>
</html>
